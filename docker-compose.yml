services:
  postgres:
    image: postgres:16-alpine
    container_name: summoner-build-lab-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - summoner-build-lab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  ml-api:
    profiles: ["ml"]
    build:
      context: ./ml
    container_name: summoner-build-lab-ml-api
    restart: unless-stopped
    ports:
      - "8001:8001"

volumes:
  summoner-build-lab-postgres-data:
