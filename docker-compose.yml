services:
  postgres:
    image: postgres:16-alpine
    container_name: summoner-build-lab-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - summoner-build-lab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  mongo:
    image: mongo:7
    container_name: summoner-build-lab-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - summoner-build-lab-mongo-data:/data/db
  mongo-express:
    image: mongo-express:1.0.2
    container_name: summoner-build-lab-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
  ml-api:
    profiles: ["ml"]
    build:
      context: ./ml
    container_name: summoner-build-lab-ml-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ml/artifacts:/app/artifacts
      - ./ml/configs:/app/configs:ro
      - ./ml/data:/app/data

volumes:
  summoner-build-lab-postgres-data:
  summoner-build-lab-mongo-data:
